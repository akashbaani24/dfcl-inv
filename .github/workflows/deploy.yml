name: Deploy to Vercel

# Auto-deploys to Vercel on every push to main.
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN          — https://vercel.com/account/tokens
#   VERCEL_ORG_ID         — Vercel team/org ID (project settings)
#   VERCEL_PROJECT_ID     — Vercel project ID (project settings)
#   TURSO_DATABASE_URL    — libsql://dfcl-inv-xxx.turso.io
#   TURSO_AUTH_TOKEN      — Turso auth token
# See DEPLOYMENT-GUIDE.md for full setup instructions.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔧 Generate Prisma Client
        run: bunx prisma generate

      - name: 🏗️ Build Next.js app
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: 🚀 Install Vercel CLI
        run: bun add -g vercel@latest

      - name: 🔨 Pull Vercel Environment (production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 🏗️ Build for Vercel (production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}

      - name: 🚀 Deploy to Vercel (production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: ✅ Report success
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "🎉 Deploy successful!"
          echo "🔗 Production URL: https://dfcl-inv.vercel.app (or your custom domain)"
          echo "📦 Commit: ${{ github.sha }}"
          echo "👤 Pushed by: ${{ github.actor }}"
